# Pre-commit hooks for basic repository hygiene.
# See https://pre-commit.com for setup: `pip install pre-commit && pre-commit install`
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
